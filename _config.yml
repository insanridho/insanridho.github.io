# =============================================================
# Site settings
# =============================================================
title                    : "Insan Ridho Chairuasni"
name                     : "Insan Ridho Chairuasni"
description              : "Transport and energy transition professional based in Jakarta, specialising in zero-emission vehicles, electric mobility policy, and transport decarbonisation in Indonesia and Southeast Asia."
url                      : "https://www.insanridho.com"
baseurl                  : ""
repository               : "insanridho/insanridho.github.io"

# =============================================================
# Theme
# =============================================================
remote_theme             : "academicpages/academicpages.github.io"

# =============================================================
# Author sidebar
# =============================================================
author:
  name             : "Insan Ridho Chairuasni"
  avatar           : "/assets/images/profile.jpg"
  bio              : "Transport & Energy Transition Professional."
  location         : "Jakarta, Indonesia"
  email            : "your@email.com"          # ← replace
  linkedin         : "insanridho"              # ← replace if different
  github           : "insanridho"
  # twitter        : "yourhandle"             # ← uncomment if you have one

# =============================================================
# Site navigation (top bar)
# =============================================================
navigation:
  - title: "CV"
    url: /cv/
  - title: "Talks"
    url: /talks/
  - title: "Publications"
    url: /publications/
  - title: "Blog"
    url: /blog/
  - title: "Contact"
    url: /contact/

# =============================================================
# SEO & Analytics
# =============================================================
google_analytics         :                     # ← add UA-XXXXXXXX if you have one
og_image                 : "/assets/images/profile.jpg"

# =============================================================
# Reading files
# =============================================================
include:
  - _pages
  - .htaccess
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp

# =============================================================
# Markdown & conversion
# =============================================================
markdown                 : kramdown
highlighter              : rouge
lsi                      : false
excerpt_separator        : "\n\n"
incremental              : false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# =============================================================
# Collections
# =============================================================
collections:
  talks:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/

# =============================================================
# Defaults
# =============================================================
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# =============================================================
# Plugins
# =============================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-paginate
  - jekyll-redirect-from

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-paginate
  - jekyll-redirect-from

# =============================================================
# Archives
# =============================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# =============================================================
# Pagination
# =============================================================
paginate: 5
paginate_path: /page:num/

# =============================================================
# SASS
# =============================================================
sass:
  sass_dir: _sass
  style: compressed

# =============================================================
# Output
# =============================================================
timezone: Asia/Jakarta
